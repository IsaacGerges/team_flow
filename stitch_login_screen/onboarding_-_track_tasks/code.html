<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Track Tasks</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "primary-dark": "#1a4fb8",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-display">
<!-- Mobile Frame Container -->
<div class="relative w-full max-w-md h-[844px] bg-background-light dark:bg-background-dark shadow-2xl overflow-hidden sm:rounded-[3rem] flex flex-col justify-between">
<!-- Status Bar Area (Visual Placeholder) -->
<div class="h-12 w-full flex items-center justify-between px-6 pt-2">
<span class="text-sm font-semibold text-gray-900 dark:text-white">9:41</span>
<div class="flex gap-1.5 items-center">
<div class="w-4 h-4 rounded-full bg-gray-900 dark:bg-white opacity-20"></div>
<div class="w-4 h-4 rounded-full bg-gray-900 dark:bg-white opacity-20"></div>
<div class="w-6 h-3.5 rounded-sm border border-gray-900 dark:border-white opacity-40 relative">
<div class="absolute inset-0.5 bg-gray-900 dark:bg-white w-3/4"></div>
</div>
</div>
</div>
<!-- Top Navigation (Skip Button) -->
<div class="w-full flex justify-end px-6 pt-2 z-10">
<button class="text-primary hover:text-primary-dark font-medium text-base transition-colors py-2 px-3 rounded-lg active:bg-primary/10">
                Skip
            </button>
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col items-center justify-center px-8 pb-10">
<!-- Illustration Area -->
<div class="w-full aspect-square relative mb-8 flex items-center justify-center">
<!-- Decorative Background Blob -->
<div class="absolute w-64 h-64 bg-primary/10 rounded-full blur-3xl dark:bg-primary/20 animate-pulse"></div>
<!-- Illustration Composition -->
<div class="relative w-64 h-64 bg-white dark:bg-gray-800 rounded-2xl shadow-xl flex flex-col items-center p-6 border border-gray-100 dark:border-gray-700 transform rotate-3 transition-transform duration-500 hover:rotate-0" data-alt="Stylized task list card with green checkmarks indicating completed items">
<!-- Header of the fake app card -->
<div class="w-full flex items-center gap-3 mb-6 border-b border-gray-100 dark:border-gray-700 pb-4">
<div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center text-primary">
<span class="material-icons text-xl">assignment</span>
</div>
<div class="flex flex-col gap-1.5 flex-1">
<div class="h-3 w-24 bg-gray-200 dark:bg-gray-600 rounded-full"></div>
<div class="h-2 w-16 bg-gray-100 dark:bg-gray-700 rounded-full"></div>
</div>
</div>
<!-- Checklist Items -->
<div class="w-full space-y-4">
<!-- Item 1 (Checked) -->
<div class="flex items-center gap-3">
<div class="w-6 h-6 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center border border-green-200 dark:border-green-800">
<span class="material-icons text-sm text-green-600 dark:text-green-400">check</span>
</div>
<div class="h-2.5 w-3/4 bg-gray-200 dark:bg-gray-600 rounded-full"></div>
</div>
<!-- Item 2 (Checked) -->
<div class="flex items-center gap-3">
<div class="w-6 h-6 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center border border-green-200 dark:border-green-800">
<span class="material-icons text-sm text-green-600 dark:text-green-400">check</span>
</div>
<div class="h-2.5 w-2/3 bg-gray-200 dark:bg-gray-600 rounded-full"></div>
</div>
<!-- Item 3 (Active) -->
<div class="flex items-center gap-3 opacity-60">
<div class="w-6 h-6 rounded-full border-2 border-gray-200 dark:border-gray-600"></div>
<div class="h-2.5 w-1/2 bg-gray-200 dark:bg-gray-600 rounded-full"></div>
</div>
</div>
<!-- Floating Badge -->
<div class="absolute -right-4 top-1/2 transform -translate-y-1/2 bg-white dark:bg-gray-700 px-3 py-2 rounded-lg shadow-lg border border-gray-100 dark:border-gray-600 flex items-center gap-2 animate-bounce" style="animation-duration: 3s;">
<span class="material-icons text-green-500 text-sm">trending_up</span>
<span class="text-xs font-bold text-gray-700 dark:text-gray-200">On Track</span>
</div>
</div>
</div>
<!-- Text Content -->
<div class="text-center space-y-4 max-w-xs mx-auto">
<h2 class="text-2xl font-bold text-gray-900 dark:text-white tracking-tight leading-tight">
                    Track Your Tasks
                </h2>
<p class="text-base text-gray-500 dark:text-gray-400 leading-relaxed font-normal">
                    Assign tasks, set deadlines, and monitor progress in real-time.
                </p>
</div>
</div>
<!-- Footer Section: Dots & Button -->
<div class="w-full px-8 pb-10 pt-4 bg-transparent flex flex-col gap-8">
<!-- Page Indicators -->
<div class="flex items-center justify-center gap-2">
<!-- Dot 1 (Inactive) -->
<div class="w-2.5 h-2.5 rounded-full bg-gray-300 dark:bg-gray-700 transition-colors duration-300"></div>
<!-- Dot 2 (Active - Expanded) -->
<div class="w-8 h-2.5 rounded-full bg-primary transition-all duration-300"></div>
<!-- Dot 3 (Inactive) -->
<div class="w-2.5 h-2.5 rounded-full bg-gray-300 dark:bg-gray-700 transition-colors duration-300"></div>
</div>
<!-- Next Button -->
<button class="w-full bg-primary text-white font-semibold text-lg py-4 rounded-2xl shadow-lg shadow-primary/20 hover:shadow-primary/40 hover:bg-primary-dark active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group">
                Next
                <span class="material-icons text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<!-- Home Indicator Safe Area -->
<div class="h-1 w-32 bg-gray-300 dark:bg-gray-700 rounded-full mx-auto mt-2"></div>
</div>
</div>
</body></html>
