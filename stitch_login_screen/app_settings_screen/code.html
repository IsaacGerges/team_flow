<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>App Settings Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2b6cee",
              "background-light": "#f6f6f8",
              "background-dark": "#101622",
              "neutral-100": "#f0f4fa", /* Derived from primary hue */
              "neutral-200": "#dbe3f0",
              "neutral-300": "#bac8de",
              "neutral-400": "#8ea2c2",
              "neutral-500": "#647da1",
              "neutral-800": "#242e3e",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            boxShadow: {
              'soft': '0 2px 10px rgba(43, 108, 238, 0.05)',
            }
          },
        },
      }
    </script>
<style>
        /* iOS-like toggle switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #2b6cee;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #2b6cee;
        }
        
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-neutral-800 dark:text-white pb-10">
<!-- Mobile Container -->
<div class="max-w-md mx-auto min-h-screen relative">
<!-- Navigation Bar -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-neutral-200 dark:border-neutral-800 px-4 pt-12 pb-3 flex items-center justify-between">
<button class="flex items-center text-primary active:opacity-70 transition-opacity">
<span class="material-icons-outlined text-2xl -ml-1">chevron_left</span>
<span class="text-base font-medium">Home</span>
</button>
<h1 class="text-lg font-bold absolute left-1/2 transform -translate-x-1/2">Settings</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="px-4 py-6 space-y-8">
<!-- Profile Overview (Optional but good context) -->
<div class="flex items-center gap-4 px-2">
<div class="relative">
<img alt="Profile Picture" class="w-16 h-16 rounded-full object-cover border-2 border-white dark:border-neutral-800 shadow-soft" data-alt="Man smiling in portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDrvtm5CZSat6FMYfm-1Ty4GYZRROhHLqUpNniqWaizHXM-tSYTZS2w6CZSmqoI46JsQ6350df2FPLeuXBpUtKldmFdkvIhIZ_51zBm9qQP0BLR2Z1yzVQz6s8ve64rtqyC5ls3uHYPr54P8JmRHOzYWjttvxyMXkDKPZuFQMnurkRYXmBXi6hLXJ8TDeYzEwZOTEmyUhZLHKMxTbtZkr2JpID9B_MyMCVTePE2mJ32HjJSiVraCPipJmmqEG26JzWGQthifIXaGMw"/>
<div class="absolute bottom-0 right-0 w-4 h-4 bg-green-500 border-2 border-white dark:border-neutral-800 rounded-full"></div>
</div>
<div>
<h2 class="text-xl font-bold text-neutral-900 dark:text-white">Alex Morgan</h2>
<p class="text-sm text-neutral-500">Product Manager</p>
</div>
</div>
<!-- Group: Account -->
<div>
<h3 class="px-3 mb-2 text-xs font-semibold text-neutral-500 uppercase tracking-wider">Account</h3>
<div class="bg-white dark:bg-neutral-800 rounded-lg overflow-hidden shadow-sm">
<!-- Item -->
<button class="w-full flex items-center justify-between p-4 active:bg-neutral-100 dark:active:bg-neutral-700 transition-colors group">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons-outlined text-lg">person</span>
</div>
<span class="font-medium text-sm">Edit Profile</span>
</div>
<span class="material-icons-outlined text-neutral-400 text-xl group-hover:text-primary transition-colors">chevron_right</span>
</button>
<div class="h-px bg-neutral-100 dark:bg-neutral-700 ml-14"></div>
<!-- Item -->
<button class="w-full flex items-center justify-between p-4 active:bg-neutral-100 dark:active:bg-neutral-700 transition-colors group">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons-outlined text-lg">lock</span>
</div>
<span class="font-medium text-sm">Change Password</span>
</div>
<span class="material-icons-outlined text-neutral-400 text-xl group-hover:text-primary transition-colors">chevron_right</span>
</button>
</div>
</div>
<!-- Group: Appearance -->
<div>
<h3 class="px-3 mb-2 text-xs font-semibold text-neutral-500 uppercase tracking-wider">Appearance</h3>
<div class="bg-white dark:bg-neutral-800 rounded-lg overflow-hidden shadow-sm">
<!-- Item -->
<button class="w-full flex items-center justify-between p-4 active:bg-neutral-100 dark:active:bg-neutral-700 transition-colors group">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons-outlined text-lg">dark_mode</span>
</div>
<span class="font-medium text-sm">Theme</span>
</div>
<div class="flex items-center gap-2">
<span class="text-sm text-neutral-400">System</span>
<span class="material-icons-outlined text-neutral-400 text-xl group-hover:text-primary transition-colors">chevron_right</span>
</div>
</button>
<div class="h-px bg-neutral-100 dark:bg-neutral-700 ml-14"></div>
<!-- Item -->
<button class="w-full flex items-center justify-between p-4 active:bg-neutral-100 dark:active:bg-neutral-700 transition-colors group">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons-outlined text-lg">text_fields</span>
</div>
<span class="font-medium text-sm">Font Size</span>
</div>
<div class="flex items-center gap-2">
<span class="text-sm text-neutral-400">Medium</span>
<span class="material-icons-outlined text-neutral-400 text-xl group-hover:text-primary transition-colors">chevron_right</span>
</div>
</button>
</div>
</div>
<!-- Group: Notifications -->
<div>
<h3 class="px-3 mb-2 text-xs font-semibold text-neutral-500 uppercase tracking-wider">Notifications</h3>
<div class="bg-white dark:bg-neutral-800 rounded-lg overflow-hidden shadow-sm">
<!-- Item -->
<div class="w-full flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons-outlined text-lg">notifications</span>
</div>
<span class="font-medium text-sm">Push Notifications</span>
</div>
<!-- Toggle Switch -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer border-neutral-200 dark:border-neutral-600 checked:bg-white checked:translate-x-full transition-all duration-300" id="toggle-notif" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-neutral-200 dark:bg-neutral-700 cursor-pointer transition-colors duration-300" for="toggle-notif"></label>
</div>
</div>
</div>
</div>
<!-- Group: Privacy & Security -->
<div>
<h3 class="px-3 mb-2 text-xs font-semibold text-neutral-500 uppercase tracking-wider">Privacy &amp; Security</h3>
<div class="bg-white dark:bg-neutral-800 rounded-lg overflow-hidden shadow-sm">
<!-- Item -->
<button class="w-full flex items-center justify-between p-4 active:bg-neutral-100 dark:active:bg-neutral-700 transition-colors group">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons-outlined text-lg">visibility</span>
</div>
<span class="font-medium text-sm">Profile Visibility</span>
</div>
<div class="flex items-center gap-2">
<span class="text-sm text-neutral-400">Team Only</span>
<span class="material-icons-outlined text-neutral-400 text-xl group-hover:text-primary transition-colors">chevron_right</span>
</div>
</button>
<div class="h-px bg-neutral-100 dark:bg-neutral-700 ml-14"></div>
<!-- Item -->
<div class="w-full flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons-outlined text-lg">fingerprint</span>
</div>
<span class="font-medium text-sm">Biometric Login</span>
</div>
<!-- Toggle Switch -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer border-neutral-200 dark:border-neutral-600 checked:bg-white checked:translate-x-full transition-all duration-300" id="toggle-bio" name="toggle-bio" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-neutral-200 dark:bg-neutral-700 cursor-pointer transition-colors duration-300" for="toggle-bio"></label>
</div>
</div>
</div>
</div>
<!-- Group: General -->
<div>
<h3 class="px-3 mb-2 text-xs font-semibold text-neutral-500 uppercase tracking-wider">General</h3>
<div class="bg-white dark:bg-neutral-800 rounded-lg overflow-hidden shadow-sm">
<!-- Item -->
<button class="w-full flex items-center justify-between p-4 active:bg-neutral-100 dark:active:bg-neutral-700 transition-colors group">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons-outlined text-lg">translate</span>
</div>
<span class="font-medium text-sm">Language</span>
</div>
<div class="flex items-center gap-2">
<span class="text-sm text-neutral-400">English (US)</span>
<span class="material-icons-outlined text-neutral-400 text-xl group-hover:text-primary transition-colors">chevron_right</span>
</div>
</button>
<div class="h-px bg-neutral-100 dark:bg-neutral-700 ml-14"></div>
<!-- Item -->
<button class="w-full flex items-center justify-between p-4 active:bg-neutral-100 dark:active:bg-neutral-700 transition-colors group">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons-outlined text-lg">storage</span>
</div>
<span class="font-medium text-sm">Data &amp; Storage</span>
</div>
<div class="flex items-center gap-2">
<span class="text-sm text-neutral-400">248 MB</span>
<span class="material-icons-outlined text-neutral-400 text-xl group-hover:text-primary transition-colors">chevron_right</span>
</div>
</button>
</div>
</div>
<!-- Destructive Actions -->
<div class="pt-4">
<div class="bg-red-50 dark:bg-red-900/10 rounded-lg overflow-hidden border border-red-100 dark:border-red-900/30">
<button class="w-full flex items-center justify-center p-4 text-red-600 dark:text-red-400 font-semibold text-sm active:bg-red-100 dark:active:bg-red-900/30 transition-colors">
                        Log Out
                    </button>
<div class="h-px bg-red-100 dark:bg-red-900/30"></div>
<button class="w-full flex items-center justify-center p-4 text-red-600 dark:text-red-400 font-semibold text-sm active:bg-red-100 dark:active:bg-red-900/30 transition-colors">
                        Delete Account
                    </button>
</div>
</div>
<div class="text-center pt-4 pb-8">
<p class="text-xs text-neutral-400">Version 2.4.0 (Build 1024)</p>
</div>
</main>
</div>
</body></html>
