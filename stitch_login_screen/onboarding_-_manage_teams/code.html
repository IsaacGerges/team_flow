<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Manage Teams</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4a8fe3",
                        "primary-content": "#ffffff",
                        "primary-dark": "#3a7bc8",
                        "background-light": "#f6f7f8",
                        "background-dark": "#121820",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a222c",
                        "text-primary-light": "#1f2937",
                        "text-secondary-light": "#6b7280",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom styles to ensure full height on mobile */
        html, body {
            height: 100%;
            overflow: hidden; /* Prevent scrolling for typical onboarding feel */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-primary-light dark:text-white antialiased flex flex-col h-full selection:bg-primary/30">
<!-- Top Navigation Area -->
<header class="w-full px-6 pt-12 pb-4 flex justify-end items-center z-10">
<button class="text-text-secondary-light hover:text-primary transition-colors duration-200 text-sm font-medium py-2 px-4 rounded-full hover:bg-primary/10">
            Skip
        </button>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col justify-center items-center px-8 relative w-full max-w-md mx-auto">
<!-- Illustration Container -->
<div class="w-full aspect-square mb-10 relative flex justify-center items-center">
<!-- Decorative blobs/background elements behind image -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary/5 to-primary/20 rounded-full blur-3xl transform scale-90"></div>
<!-- Main Illustration -->
<img alt="Team collaborating around a table with laptops" class="relative w-full h-full object-contain drop-shadow-xl rounded-2xl" data-alt="Illustration of diverse team collaborating at a table with laptops" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAAW7-lNCho0vDykNFAa6_wyMr203RjILtI2mYaKjmUV2oN7irMD4F8zJMsGsyS0DUeNoRSjbElHFHza7dpCYWcFPQJTmUx7LAPy3Cx8AFCMFNk3n5nsodaplRSSnMQLg699_QWd7f5E-6RRKvYpVU4YvdHYCsXgEelU4asMMrSPvu1hplaB36kfWw6xRVDZ39-ISet6NMDqKpH-CTgsxfWIxyD9B2KKMEYR4oWiScY-Rtfb4t7y-VKnKfXDcvz50kR-iMP_79GsIA" style="mask-image: linear-gradient(to bottom, black 80%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);"/>
</div>
<!-- Text Content -->
<div class="text-center space-y-4 max-w-xs mx-auto">
<h1 class="text-2xl font-bold text-gray-900 dark:text-white leading-tight tracking-tight">
                Create &amp; Manage Teams
            </h1>
<p class="text-base text-gray-500 dark:text-gray-400 leading-relaxed">
                Build your team, add members, and collaborate efficiently
            </p>
</div>
</main>
<!-- Bottom Navigation Area -->
<footer class="w-full px-8 pb-10 pt-6 flex flex-col items-center gap-8 max-w-md mx-auto">
<!-- Page Indicators -->
<div aria-label="Progress indicators" class="flex items-center gap-3">
<!-- Active Dot -->
<div class="h-2 w-8 bg-primary rounded-full transition-all duration-300"></div>
<!-- Inactive Dots -->
<div class="h-2 w-2 bg-primary/20 rounded-full"></div>
<div class="h-2 w-2 bg-primary/20 rounded-full"></div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-4 px-6 rounded-xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group">
<span>Next</span>
<span class="material-icons text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<!-- Safe area spacer for iOS home indicator -->
<div class="h-2 w-full"></div>
</footer>
</body></html>
