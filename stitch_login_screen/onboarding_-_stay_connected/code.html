            theme: {

                    colors: {

<style>
        /* Custom scrollbar hide for cleaner UI */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Smooth fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-gray-100 h-screen w-screen overflow-hidden flex flex-col antialiased selection:bg-primary selection:text-white">
<!-- Status Bar Mockup -->
<div class="w-full flex justify-between items-center px-6 py-2 z-50 absolute top-0 left-0">

<div class="flex items-center gap-2">
<span class="material-icons text-lg">signal_cellular_alt</span>
<span class="material-icons text-lg">wifi</span>
<span class="material-icons text-lg">battery_full</span>
</div>
</div>
<!-- Main Content Container -->
<main class="flex-1 flex flex-col relative h-full max-w-md mx-auto w-full bg-background-light dark:bg-background-dark">
<!-- Top Section: Illustration Area -->
<div class="flex-1 flex flex-col justify-end items-center pb-8 relative px-6">
<!-- Decorative Background Elements -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">

<div class="absolute -top-20 -right-20 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute top-1/4 -left-20 w-72 h-72 bg-blue-400/10 rounded-full blur-3xl"></div>
</div>
<!-- Hero Illustration Container -->
<div class="w-full aspect-square relative flex items-center justify-center animate-fade-in">
<!-- Main Image -->
<div class="relative w-full max-w-[340px] h-auto">
<!-- Abstract representation of connection lines behind -->
<svg class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] opacity-20 text-primary animate-[pulse_4s_ease-in-out_infinite]" fill="none" viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<circle cx="100" cy="100" r="80" stroke="currentColor" stroke-dasharray="4 4" stroke-width="1"></circle>
<circle cx="100" cy="100" r="60" stroke="currentColor" stroke-width="1"></circle>
</svg>
<img alt="Team Collaboration" class="w-full h-full object-contain drop-shadow-2xl rounded-2xl mask-image-gradient" data-alt="Illustration of team members collaborating and chatting on mobile devices" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBj6saQugH6Q4eW1gFfUkRltHmrCkKkcP_Wx1ZayUWsGJLS7lPKcqz8eBv40sokGx621hB8sW5ZqrRJ8Yu7yZrGQuXRdEjg3K3cThx7rMJqknP8XoixSt24_I9vnActPm8Bzv6Ep_eZjAyqSbg_Q7U16c3s9MNDj2r5wBwHQ-nXL4DXkQ-BQpHIXiOkOe_zn9uH5x5vFNeJ5bvUCR-2qfpwgzZsT3bnrA2c6g9h7HnsNVi7I52hZAhKt3a2DFekrO8l-10bK1sp9AI" style="mask-image: linear-gradient(to bottom, black 80%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);"/>
<!-- Floating UI Card Elements for "Chat" effect -->
<div class="absolute -right-4 top-1/4 bg-white dark:bg-gray-800 p-3 rounded-2xl shadow-soft-xl flex items-center gap-3 animate-bounce" style="animation-duration: 3s;">
<div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-icons text-primary text-sm">chat</span>
</div>
<div class="space-y-1">
<div class="h-2 w-16 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
<div class="h-2 w-10 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
</div>
</div>
<div class="absolute -left-2 bottom-1/4 bg-white dark:bg-gray-800 p-3 rounded-2xl shadow-soft-xl flex items-center gap-3 animate-bounce delay-100" style="animation-duration: 3.5s;">
<div class="w-8 h-8 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center">
<span class="material-icons text-green-500 text-sm">check_circle</span>
</div>
<div class="text-xs font-semibold text-gray-600 dark:text-gray-300">Task Complete</div>
</div>
</div>
</div>
</div>
<!-- Bottom Section: Content & Actions -->
<div class="bg-background-light dark:bg-background-dark w-full px-6 pb-8 pt-4 flex flex-col items-center text-center z-10">
<!-- Text Content -->
<div class="mb-8 max-w-xs mx-auto space-y-3">
<h1 class="text-3xl font-bold text-gray-900 dark:text-white leading-tight animate-fade-in delay-100">
                    Team Chat &amp; <br/><span class="text-primary">Notifications</span>
</h1>
<p class="text-base text-gray-500 dark:text-gray-400 font-normal leading-relaxed animate-fade-in delay-200">
                    Communicate instantly with your team members and never miss an important update.
                </p>
</div>
<!-- Page Indicators -->
<div class="flex items-center gap-2 mb-8 animate-fade-in delay-200">
<div class="w-2 h-2 rounded-full bg-gray-300 dark:bg-gray-700 transition-colors duration-300"></div>
<div class="w-2 h-2 rounded-full bg-gray-300 dark:bg-gray-700 transition-colors duration-300"></div>
<div class="w-8 h-2 rounded-full bg-primary shadow-glow transition-all duration-300"></div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 px-6 rounded-xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all duration-200 text-lg flex items-center justify-center gap-2 group animate-fade-in delay-300">
<span>Get Started</span>
<span class="material-icons text-white text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<!-- Bottom safe area spacing -->
<div class="h-6"></div>
</div>
</main>
<script>
        // Simple JS to set current time
        const now = new Date();
        const hours = now.getHours() % 12 || 12;
        const minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('time').textContent = `${hours}:${minutes}`;
    </script>
</body></html>
