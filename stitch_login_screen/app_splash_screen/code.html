<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Team Task Manager - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "primary-dark": "#1a4bb0",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        /* Custom Loading Spinner Animation */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-left-color: #ffffff;
            border-radius: 50%;
            width: 3rem;
            height: 3rem;
            animation: spin 1s linear infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark h-screen w-screen overflow-hidden flex flex-col items-center justify-center relative">
<!-- Gradient Background: Merging theme primary with requested gradient feel -->
<div class="absolute inset-0 bg-gradient-to-br from-[#4A90E2] via-primary to-[#1a4bb0] dark:from-[#2C5F8D] dark:via-primary-dark dark:to-background-dark z-0"></div>
<!-- Main Content Container -->
<div class="relative z-10 flex flex-col items-center justify-center flex-grow w-full max-w-md px-6">
<!-- Logo Container -->
<div class="w-[120px] h-[120px] bg-white/10 backdrop-blur-md rounded-3xl flex items-center justify-center shadow-xl border border-white/20 mb-8 transform hover:scale-105 transition-transform duration-500">
<!-- Logo Icon using Material Icons -->
<span class="material-icons text-white text-7xl drop-shadow-lg">
                check_circle
            </span>
</div>
<!-- App Name -->
<h1 class="text-white text-3xl font-bold tracking-tight text-center drop-shadow-md">
            Team Task Manager
        </h1>
<!-- Tagline (Optional but fits context) -->
<p class="text-white/80 text-sm mt-2 font-medium tracking-wide">
            Sync. Manage. Succeed.
        </p>
</div>
<!-- Footer Area: Loader & Version -->
<div class="relative z-10 flex flex-col items-center justify-end pb-12 w-full">
<!-- Loading Indicator -->
<div class="spinner mb-8 opacity-90"></div>
<!-- Version Number -->
<span class="text-white/60 text-xs font-medium tracking-wider uppercase">
            v1.0.0
        </span>
<!-- Bottom Safe Area Spacer for iOS -->
<div class="h-4 w-full"></div>
</div>
<!-- Decorative Abstract Element (Subtle overlay for texture) -->
<div class="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full blur-3xl -mr-16 -mt-16 pointer-events-none z-0"></div>
<div class="absolute bottom-0 left-0 w-80 h-80 bg-black/10 rounded-full blur-3xl -ml-20 -mb-20 pointer-events-none z-0"></div>
</body></html>
