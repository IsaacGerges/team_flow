<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create New Team</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
            extend: {
                colors: {
                    "primary": "#2b6cee",
                    "background-light": "#f6f6f8",
                    "background-dark": "#101622",
                },
                fontFamily: {
                    "display": ["Inter", "sans-serif"]
                },
                borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
            },
        }
    </script>
<style>
        /* Custom Toggle Switch Style to mimic iOS/Material hybrid */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #2b6cee;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #2b6cee;
        }
        /* Hide scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-white min-h-screen flex justify-center">
<!-- Main Mobile Container -->
<div class="w-full max-w-md bg-white dark:bg-gray-900 h-screen flex flex-col relative shadow-xl overflow-hidden">
<!-- App Bar -->
<header class="flex items-center justify-between px-4 py-3 bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 z-10 sticky top-0">
<button class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300 transition-colors">
<span class="material-icons text-2xl">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-semibold text-gray-900 dark:text-white">Create New Team</h1>
<button class="px-2 py-1 text-primary font-semibold text-base hover:opacity-80 transition-opacity">
                Save
            </button>
</header>
<!-- Scrollable Content -->
<main class="flex-1 overflow-y-auto no-scrollbar p-6 pb-24">
<!-- Avatar Section -->
<div class="flex flex-col items-center mb-8">
<div class="relative group cursor-pointer">
<div class="w-28 h-28 rounded-full border-2 border-dashed border-primary bg-primary/5 flex flex-col items-center justify-center hover:bg-primary/10 transition-colors">
<span class="material-icons text-primary text-3xl mb-1">add_a_photo</span>
<span class="text-xs font-medium text-primary">Upload Logo</span>
</div>
<!-- Helper Badge (Optional) -->
<div class="absolute bottom-1 right-1 bg-white dark:bg-gray-800 rounded-full p-1.5 shadow-md border border-gray-100 dark:border-gray-700">
<span class="material-icons text-gray-500 text-sm">edit</span>
</div>
</div>
</div>
<!-- Form Fields -->
<form class="space-y-6">
<!-- Team Name -->
<div class="relative">
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5 ml-1" for="team-name">Team Name</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-xl bg-background-light dark:bg-gray-800 border-transparent focus:border-primary focus:bg-white dark:focus:bg-gray-900 focus:ring-0 transition-all text-gray-900 dark:text-white placeholder-gray-400" id="team-name" maxlength="50" placeholder="e.g. Engineering Squad" type="text"/>
<span class="absolute right-3 bottom-3 text-xs text-gray-400 font-medium">0/50</span>
</div>
</div>
<!-- Description -->
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5 ml-1" for="description">Description</label>
<textarea class="w-full px-4 py-3 rounded-xl bg-background-light dark:bg-gray-800 border-transparent focus:border-primary focus:bg-white dark:focus:bg-gray-900 focus:ring-0 transition-all text-gray-900 dark:text-white placeholder-gray-400 resize-none" id="description" placeholder="What is this team's purpose?" rows="4"></textarea>
</div>
<!-- Category Dropdown -->
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5 ml-1" for="category">Category</label>
<div class="relative">
<select class="w-full px-4 py-3 rounded-xl bg-background-light dark:bg-gray-800 border-transparent focus:border-primary focus:bg-white dark:focus:bg-gray-900 focus:ring-0 transition-all text-gray-900 dark:text-white appearance-none cursor-pointer" id="category">
<option disabled="" selected="" value="">Select Category...</option>
<option value="development">Development</option>
<option value="design">Design</option>
<option value="marketing">Marketing</option>
<option value="sales">Sales</option>
<option value="hr">Human Resources</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
<span class="material-icons">expand_more</span>
</div>
</div>
</div>
<!-- Privacy Toggle -->
<div class="pt-2">
<div class="flex items-center justify-between p-4 rounded-xl border border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-900 shadow-sm">
<div class="flex flex-col pr-4">
<div class="flex items-center gap-2 mb-1">
<span class="material-icons text-gray-500 text-sm">lock</span>
<span class="font-medium text-gray-900 dark:text-white">Private Team</span>
</div>
<span class="text-xs text-gray-500 leading-snug">Only invited members can view this team's projects and discussions.</span>
</div>
<!-- Toggle Switch -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer outline-none transition-all duration-300 left-0 top-0 border-gray-300 shadow-sm z-10" id="toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300" for="toggle"></label>
</div>
</div>
</div>
</form>
</main>
<!-- Bottom Action Buttons -->
<div class="absolute bottom-0 w-full bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-t border-gray-100 dark:border-gray-800 p-4 pb-8 z-20 flex flex-col gap-3">
<button class="w-full bg-primary text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-primary/30 hover:shadow-primary/40 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-icons text-xl">check</span>
                Create Team
            </button>
<button class="w-full bg-transparent border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300 font-semibold py-3.5 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800 active:bg-gray-100 dark:active:bg-gray-700 transition-colors">
                Cancel
            </button>
</div>
</div>
</body></html>
