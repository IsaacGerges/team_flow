<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#2b6cee",
                "primary-dark": "#1a4fb0",
                "background-light": "#f6f6f8",
                "background-dark": "#101622",
                "surface-light": "#ffffff",
                "surface-dark": "#1e293b",
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {
                "DEFAULT": "0.5rem", 
                "lg": "1rem", 
                "xl": "1.5rem", 
                "full": "9999px",
                "md3": "12px" 
              },
              spacing: {
                '14': '3.5rem', // 56px height
              }
            },
          },
        }
    </script>
<style>
        /* Custom styles for Material Design 3 Input Floating Labels */
        .md3-input-group {
            position: relative;
        }
        
        .md3-input {
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .md3-input:focus + .md3-label,
        .md3-input:not(:placeholder-shown) + .md3-label {
            transform: translateY(-50%) scale(0.85);
            top: 0;
            background-color: white; /* Needs to match background */
            padding: 0 4px;
            color: #2b6cee;
        }

        .dark .md3-input:focus + .md3-label,
        .dark .md3-input:not(:placeholder-shown) + .md3-label {
            background-color: #1e293b; /* Dark mode surface color */
        }
        
        .md3-label {
            transition: all 0.2s ease-out;
            pointer-events: none;
        }

        /* Hide standard scrollbar for a clean phone view if content overflows */
        body::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 selection:bg-primary/30">
<!-- Main Container: Mobile Form Factor -->
<main class="w-full max-w-sm mx-auto bg-surface-light dark:bg-surface-dark rounded-xl shadow-xl overflow-hidden relative">
<!-- Header Section -->
<div class="px-6 pt-10 pb-6 text-center">
<h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2 tracking-tight">Create Account</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Sign up to get started</p>
</div>
<!-- Form Section -->
<form class="px-6 pb-8 flex flex-col gap-4">
<!-- Full Name Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-icons-round text-slate-400 group-focus-within:text-primary transition-colors text-[24px]">person</span>
</div>
<input class="block w-full h-14 pl-11 pr-4 text-base bg-transparent border border-slate-300 dark:border-slate-600 rounded-md3 text-slate-900 dark:text-white placeholder-transparent focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all md3-input peer" id="fullname" placeholder="Full Name" required="" type="text"/>
<label class="absolute left-11 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 text-base md3-label peer-focus:text-primary dark:peer-focus:text-primary" for="fullname">
                    Full Name
                </label>
</div>
<!-- Email Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-icons-round text-slate-400 group-focus-within:text-primary transition-colors text-[24px]">mail</span>
</div>
<input class="block w-full h-14 pl-11 pr-4 text-base bg-transparent border border-slate-300 dark:border-slate-600 rounded-md3 text-slate-900 dark:text-white placeholder-transparent focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all md3-input peer" id="email" placeholder="Email Address" required="" type="email"/>
<label class="absolute left-11 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 text-base md3-label peer-focus:text-primary dark:peer-focus:text-primary" for="email">
                    Email Address
                </label>
</div>
<!-- Password Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-icons-round text-slate-400 group-focus-within:text-primary transition-colors text-[24px]">lock</span>
</div>
<input class="block w-full h-14 pl-11 pr-12 text-base bg-transparent border border-slate-300 dark:border-slate-600 rounded-md3 text-slate-900 dark:text-white placeholder-transparent focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all md3-input peer" id="password" placeholder="Password" required="" type="password"/>
<label class="absolute left-11 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 text-base md3-label peer-focus:text-primary dark:peer-focus:text-primary" for="password">
                    Password
                </label>
<button class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 focus:outline-none" type="button">
<span class="material-icons-round text-[24px]">visibility_off</span>
</button>
</div>
<!-- Confirm Password Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-icons-round text-slate-400 group-focus-within:text-primary transition-colors text-[24px]">lock_outline</span>
</div>
<input class="block w-full h-14 pl-11 pr-4 text-base bg-transparent border border-slate-300 dark:border-slate-600 rounded-md3 text-slate-900 dark:text-white placeholder-transparent focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all md3-input peer" id="confirm_password" placeholder="Confirm Password" required="" type="password"/>
<label class="absolute left-11 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 text-base md3-label peer-focus:text-primary dark:peer-focus:text-primary" for="confirm_password">
                    Confirm Password
                </label>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start mt-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 border border-slate-300 rounded bg-gray-50 focus:ring-3 focus:ring-primary/30 dark:bg-gray-700 dark:border-gray-600 dark:focus:ring-primary/50 text-primary transition-colors" id="terms" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-medium text-slate-600 dark:text-slate-300" for="terms">I agree to the <a class="text-primary hover:text-primary-dark font-semibold" href="#">Terms &amp; Conditions</a></label>
</div>
</div>
<!-- Sign Up Button -->
<button class="w-full h-14 mt-4 bg-primary hover:bg-primary-dark text-white font-semibold rounded-md3 shadow-lg shadow-primary/30 active:scale-[0.98] transition-all duration-200 flex items-center justify-center text-base" type="submit">
                Sign Up
            </button>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="flex-shrink-0 mx-4 text-slate-400 text-sm font-medium uppercase tracking-wider">OR</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<!-- Google Sign Up Button -->
<button class="w-full h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-medium rounded-md3 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Sign Up with Google
            </button>
<!-- Footer Link -->
<div class="mt-4 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    Already have an account? 
                    <a class="text-primary hover:text-primary-dark font-bold ml-1 transition-colors" href="#">Login</a>
</p>
</div>
</form>
</main>
<!-- decorative blurred circles -->
<div class="fixed top-[-10%] right-[-10%] w-64 h-64 bg-primary/20 rounded-full blur-3xl -z-10 dark:bg-primary/10"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-64 h-64 bg-primary/20 rounded-full blur-3xl -z-10 dark:bg-primary/10"></div>
</body></html>
