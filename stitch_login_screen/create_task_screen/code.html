<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Task Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
            extend: {
                colors: {
                "primary": "#2b6cee",
                "background-light": "#f6f6f8",
                "background-dark": "#101622",
                },
                fontFamily: {
                "display": ["Inter", "sans-serif"]
                },
                borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for horizontal scroll areas */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-white antialiased h-screen flex justify-center overflow-hidden">
<!-- Phone Container -->
<div class="w-full max-w-md h-full bg-white dark:bg-[#1a202c] relative flex flex-col shadow-2xl overflow-hidden sm:rounded-xl sm:h-[90vh] sm:my-auto">
<!-- Header -->
<header class="flex items-center justify-between px-4 py-3 border-b border-gray-100 dark:border-gray-800 bg-white dark:bg-[#1a202c] z-10">
<button class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 text-sm font-medium">
                Cancel
            </button>
<h1 class="text-base font-semibold text-gray-900 dark:text-white">New Task</h1>
<button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-50 dark:hover:bg-gray-800 text-primary">
<span class="material-icons-round text-xl">more_horiz</span>
</button>
</header>
<!-- Main Form Content -->
<div class="flex-1 overflow-y-auto no-scrollbar pb-24">
<div class="px-5 pt-6 pb-6 space-y-6">
<!-- Title & Description -->
<div class="space-y-4">
<div class="relative group">
<input class="w-full bg-transparent border-0 border-b-2 border-gray-200 dark:border-gray-700 focus:border-primary focus:ring-0 text-2xl font-bold placeholder-gray-300 dark:placeholder-gray-600 px-0 py-2 transition-colors" placeholder="Task Title" type="text"/>
</div>
<div class="relative">
<textarea class="w-full bg-gray-50 dark:bg-gray-800/50 border-0 rounded-lg p-3 text-sm resize-none focus:ring-1 focus:ring-primary/50 text-gray-700 dark:text-gray-300 placeholder-gray-400" placeholder="Add a description..." rows="3"></textarea>
</div>
</div>
<!-- Team Selector -->
<div class="space-y-2">
<label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Project / Team</label>
<button class="w-full flex items-center justify-between bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-3 group hover:border-primary/50 transition-colors">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons-round text-lg">folder_open</span>
</div>
<div class="text-left">
<div class="text-sm font-semibold text-gray-900 dark:text-white">Product Design</div>
<div class="text-xs text-gray-500">Marketing Team</div>
</div>
</div>
<span class="material-icons-round text-gray-400 group-hover:text-primary">expand_more</span>
</button>
</div>
<!-- Assignees -->
<div class="space-y-2">
<label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Assign to</label>
<div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
<!-- Add Button -->
<button class="flex-shrink-0 w-10 h-10 rounded-full border border-dashed border-gray-300 dark:border-gray-600 flex items-center justify-center text-gray-400 hover:text-primary hover:border-primary transition-colors">
<span class="material-icons-round">add</span>
</button>
<!-- Assignee Chips -->
<div class="flex items-center gap-2 bg-primary/10 pl-1 pr-3 py-1 rounded-full border border-primary/20">
<img class="w-8 h-8 rounded-full object-cover" data-alt="Female team member portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDHqMeEk7jGcOf4WyPiVNYtS0dHC_KrhlxcYYHX_-IYcOv6zXKoo62V1XzEu0nZNm_BCtv7y_w5SqZfmCncBbKTvQUK90GMCfNOXT3VCoXRnsd3Nm2uztbqpVjv2n1kXorDInArGclJ-zgzldmnfA7eisxwpJgG8qOOCg4Dx5YWvX_QSSTSIUARyi2xNI4SBgFe7OnRFp34OIxadfaxDFCCKj8vBzF7TPbkqQ_SxEUgMqNtiuvX7rFiipYUIwl84x4eRc1lvmGe9bM"/>
<span class="text-sm font-medium text-primary">Sarah</span>
<button class="text-primary/60 hover:text-primary">
<span class="material-icons-round text-base">close</span>
</button>
</div>
<div class="flex items-center gap-2 bg-gray-100 dark:bg-gray-800 pl-1 pr-3 py-1 rounded-full border border-gray-200 dark:border-gray-700">
<img class="w-8 h-8 rounded-full object-cover grayscale opacity-70" data-alt="Male team member portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBA6403kwZZnsg_0M4UrYJY_qJTTF_seXe0LU2YptXgHGSRDv_QxGk22Y8HfFm6CWaFlagnRBsF07ULzxNlrQmD2AZDOCm3Wh3U716BCGZSt9fg3qOihZbDGHkpR2PEzr93niEQ_zsfh2E1Zo0z3e8QKRjV6tRnMyUtBIhHYInUF_6ZNHKnurWeOnkn6YA87TSe9sq2VNCARFGpJfOoZlH2N7PGXHKucsztYO9zC3jIbEprMidl-F486BvQaIfND9IeMA8ShXY-hTU"/>
<span class="text-sm font-medium text-gray-600 dark:text-gray-400">Mike</span>
</div>
</div>
</div>
<!-- Priority -->
<div class="space-y-3">
<label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Priority</label>
<div class="grid grid-cols-3 gap-3">
<label class="cursor-pointer">
<input class="peer sr-only" name="priority" type="radio"/>
<div class="flex flex-col items-center justify-center py-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 peer-checked:border-red-500/50 peer-checked:bg-red-50 dark:peer-checked:bg-red-900/20 transition-all">
<span class="w-2 h-2 rounded-full bg-red-500 mb-2"></span>
<span class="text-xs font-medium text-gray-600 dark:text-gray-300 peer-checked:text-red-600 dark:peer-checked:text-red-400">High</span>
</div>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="priority" type="radio"/>
<div class="flex flex-col items-center justify-center py-3 border border-primary rounded-lg bg-primary/5 dark:bg-primary/10 transition-all shadow-sm ring-1 ring-primary/20">
<span class="w-2 h-2 rounded-full bg-orange-400 mb-2"></span>
<span class="text-xs font-medium text-primary">Medium</span>
</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="priority" type="radio"/>
<div class="flex flex-col items-center justify-center py-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 peer-checked:border-green-500/50 peer-checked:bg-green-50 dark:peer-checked:bg-green-900/20 transition-all">
<span class="w-2 h-2 rounded-full bg-green-500 mb-2"></span>
<span class="text-xs font-medium text-gray-600 dark:text-gray-300 peer-checked:text-green-600 dark:peer-checked:text-green-400">Low</span>
</div>
</label>
</div>
</div>
<!-- Schedule -->
<div class="space-y-4 pt-2">
<div class="bg-gray-50 dark:bg-gray-800/50 rounded-lg p-4 space-y-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded bg-white dark:bg-gray-700 flex items-center justify-center shadow-sm">
<span class="material-icons-round text-primary text-lg">event</span>
</div>
<span class="text-sm font-medium text-gray-700 dark:text-gray-200">Start Date</span>
</div>
<span class="text-sm font-semibold text-gray-900 dark:text-white bg-white dark:bg-gray-700 px-3 py-1.5 rounded border border-gray-200 dark:border-gray-600 shadow-sm">Oct 24, 10:00 AM</span>
</div>
<div class="w-full h-px bg-gray-200 dark:bg-gray-700"></div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded bg-white dark:bg-gray-700 flex items-center justify-center shadow-sm">
<span class="material-icons-round text-red-400 text-lg">event_busy</span>
</div>
<span class="text-sm font-medium text-gray-700 dark:text-gray-200">Due Date</span>
</div>
<span class="text-sm font-semibold text-gray-400 dark:text-gray-500 bg-transparent px-3 py-1.5">Set date</span>
</div>
</div>
<!-- Recurring Toggle -->
<div class="flex items-center justify-between px-2">
<span class="text-sm font-medium text-gray-700 dark:text-gray-300">Recurring Task</span>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</div>
<!-- Accordions -->
<div class="space-y-4 pt-2">
<!-- Tags Accordion -->
<details class="group bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden">
<summary class="flex items-center justify-between p-4 cursor-pointer list-none hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
<div class="flex items-center gap-3">
<span class="material-icons-round text-gray-400">label</span>
<span class="text-sm font-medium text-gray-700 dark:text-gray-200">Tags</span>
</div>
<div class="flex items-center gap-2">
<span class="text-xs text-gray-400 bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded-full">2 selected</span>
<span class="material-icons-round text-gray-400 transition-transform group-open:rotate-180">expand_more</span>
</div>
</summary>
<div class="px-4 pb-4 pt-0">
<div class="flex flex-wrap gap-2 mt-2">
<span class="px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300 border border-blue-200 dark:border-blue-800">UI Design</span>
<span class="px-3 py-1 rounded-full text-xs font-medium bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-300 border border-purple-200 dark:border-purple-800">High Priority</span>
<button class="px-3 py-1 rounded-full text-xs font-medium border border-dashed border-gray-300 text-gray-500 hover:border-primary hover:text-primary transition-colors flex items-center gap-1">
<span class="material-icons-round text-[14px]">add</span> Add Tag
                                </button>
</div>
</div>
</details>
<!-- Attachments Accordion -->
<details class="group bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden">
<summary class="flex items-center justify-between p-4 cursor-pointer list-none hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
<div class="flex items-center gap-3">
<span class="material-icons-round text-gray-400">attach_file</span>
<span class="text-sm font-medium text-gray-700 dark:text-gray-200">Attachments</span>
</div>
<div class="flex items-center gap-2">
<span class="material-icons-round text-gray-400 transition-transform group-open:rotate-180">expand_more</span>
</div>
</summary>
<div class="px-4 pb-4 pt-0 text-center">
<div class="border-2 border-dashed border-gray-200 dark:border-gray-700 rounded-lg p-6 hover:border-primary/50 transition-colors cursor-pointer">
<span class="material-icons-round text-gray-400 text-3xl mb-2">cloud_upload</span>
<p class="text-xs text-gray-500">Tap to upload files</p>
</div>
</div>
</details>
</div>
<!-- Spacer for Footer -->
<div class="h-10"></div>
</div>
</div>
<!-- Sticky Footer Action Bar -->
<div class="absolute bottom-0 left-0 w-full bg-white/90 dark:bg-[#1a202c]/90 backdrop-blur-md border-t border-gray-100 dark:border-gray-800 p-4 pb-6 z-20">
<div class="flex gap-3">
<button class="flex-1 py-3.5 px-4 rounded-lg border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-semibold text-sm hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                    Save Draft
                </button>
<button class="flex-1 py-3.5 px-4 rounded-lg bg-primary hover:bg-blue-600 text-white font-semibold text-sm shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2">
<span class="material-icons-round text-sm">check</span>
                    Create Task
                </button>
</div>
</div>
</div>
</body></html>
