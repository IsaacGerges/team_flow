<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login Screen</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4a8fe3",
                        "primary-dark": "#3a7bc8",
                        "background-light": "#ffffff",
                        "background-dark": "#121820",
                        "surface-light": "#f5f5f5",
                        "surface-dark": "#1e293b",
                        "text-main": "#1A1A1A",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem", // ~12px/dp
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    spacing: {
                        '15': '3.75rem', // ~60dp
                        '20': '5rem', // ~80dp
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-text-main dark:text-white min-h-screen flex flex-col items-center justify-center relative overflow-hidden antialiased">
<!-- Decorative subtle background shapes using Primary Color Hue -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-20 -left-20 w-64 h-64 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<!-- Main Container: Mobile Form Factor Width Restriction -->
<main class="w-full max-w-md px-6 py-8 h-full flex flex-col z-10">
<!-- Header Section -->
<div class="flex flex-col items-center mt-6 mb-8">
<!-- Logo -->
<div class="w-20 h-20 bg-primary/10 rounded-2xl flex items-center justify-center mb-6 shadow-sm overflow-hidden">
<img alt="App Logo Abstract Blue Shape" class="w-full h-full object-cover opacity-90" data-alt="Abstract blue geometric shape representing a modern app logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6arKdzOuueichPspPmVIWBS2H-5lZnLOgLtUPqByXvThIdcRyCDD_VuM7xFtm0CDeMVan_7DhWf1fk49edAwtQUOhDEBtM7Acn-TUX1Qt1b_v69nE4IXMyZ6jks3YrOUyMQPM8Swny8FIUxpSmPP-k2eywM60Li84nYrbFv8JxtwWITAB30FOLJwC4Dagv7cYZS-AUmidDanFw8nEdIsxC8ixgBPDPxM36Xnp8eCl-PFi7TPRu76EmBGNwJNs1p0qA8Z22JAHiwQ"/>
</div>
<!-- Title -->
<h1 class="text-[28px] font-bold text-text-main dark:text-white leading-tight text-center">
                Welcome Back!
            </h1>
<!-- Subtitle -->
<p class="text-base text-gray-500 dark:text-gray-400 mt-2 text-center">
                Login to continue
            </p>
</div>
<!-- Form Section -->
<form class="w-full space-y-5" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-icons-outlined text-gray-400 group-focus-within:text-primary transition-colors">mail_outline</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-light dark:bg-surface-dark border-none rounded-lg text-text-main dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-primary/50 focus:bg-white dark:focus:bg-gray-800 transition-all duration-200 outline-none" placeholder="Email Address" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-icons-outlined text-gray-400 group-focus-within:text-primary transition-colors">lock_outline</span>
</div>
<input class="w-full h-14 pl-12 pr-12 bg-surface-light dark:bg-surface-dark border-none rounded-lg text-text-main dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-primary/50 focus:bg-white dark:focus:bg-gray-800 transition-all duration-200 outline-none" placeholder="Password" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 focus:outline-none" type="button">
<span class="material-icons-outlined text-[20px]">visibility_off</span>
</button>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="text-sm font-medium text-primary hover:text-primary-dark transition-colors" href="#">
                    Forgot Password?
                </a>
</div>
<!-- Login Button -->
<button class="w-full h-14 bg-primary hover:bg-primary-dark text-white font-semibold rounded-lg shadow-lg shadow-primary/30 active:scale-[0.98] transition-all duration-200 flex items-center justify-center text-[16px]" type="submit">
                Login
            </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-background-light dark:bg-background-dark text-gray-400 dark:text-gray-500 font-medium">OR</span>
</div>
</div>
<!-- Social Login -->
<button class="w-full h-14 bg-white dark:bg-surface-dark border border-gray-200 dark:border-gray-700 text-text-main dark:text-white font-medium rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3" type="button">
<img alt="Google Logo" class="w-5 h-5" data-alt="Google G Logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDkkWWNkuLENHev-vjmw78nkMBVrzo2HDacEAiJ_bB2a87CmpNFirJIxyCBSXRvy-_GsgDAG9_jPPcAuVeOB-xq4c-bvqRyEvOhDeMLzYenMyxripeps8xJ7bkS5InmvW2AEDvV4ndMQpsUssaMURz5cDDtlnK7B9E20k-lzdHXPnh4ZXLQEgtqjGsrNziYzNIA46IbGNh9bpytrYyP4DY8lABfVG9tZdsEsvEUewP-F4p_UhMxPP9yqce_bqp_RIw93g4MAHDoo9M"/>
            Sign in with Google
        </button>
<!-- Spacer to push footer down on taller screens -->
<div class="flex-grow"></div>
<!-- Footer -->
<div class="mt-8 text-center pb-4">
<p class="text-sm text-gray-500 dark:text-gray-400">
                Don't have an account? 
                <a class="font-bold text-primary hover:text-primary-dark ml-1 transition-colors" href="#">Sign Up</a>
</p>
</div>
</main>
</body></html>
