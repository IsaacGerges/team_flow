<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password Screen</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "primary-hover": "#1e5cc8",
                        "background-light": "#f6f6f8", // Keeping theme config, but overriding body to white per prompt
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-white font-display text-gray-900 antialiased h-screen flex flex-col relative overflow-hidden">
<!-- Top Navigation Area -->
<header class="w-full px-6 pt-12 pb-4 flex items-center z-10">
<button class="group p-2 -ml-2 rounded-full hover:bg-gray-100 transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50" type="button">
<span class="material-icons-round text-gray-800 text-3xl group-hover:text-primary transition-colors">arrow_back</span>
</button>
</header>
<!-- Main Content Area -->
<!-- Using a centralized layout structure tailored for phone dimensions -->
<main class="flex-1 flex flex-col px-8 w-full max-w-md mx-auto relative z-0">
<!-- Hero Icon Area -->
<!-- Requirement: 120x120 dp, approx 80dp from top (using mt-10 to mt-16 range for visual balance) -->
<div class="mt-8 mb-6 flex justify-center">
<div class="w-[120px] h-[120px] bg-primary/10 rounded-full flex items-center justify-center relative ring-8 ring-primary/5">
<span class="material-icons-round text-primary text-[64px]">lock_open</span>
<!-- Decorative dot -->
<div class="absolute top-6 right-6 w-3 h-3 bg-primary rounded-full ring-2 ring-white"></div>
</div>
</div>
<!-- Typography Block -->
<!-- Requirement: Title 24dp below icon, Desc 12dp below title -->
<div class="text-center space-y-3 mb-10">
<h1 class="text-2xl font-bold text-gray-900 tracking-tight">Forgot Password?</h1>
<p class="text-sm text-gray-500 leading-relaxed max-w-[280px] mx-auto">
                Enter your email and we'll send you a reset link to get back into your account.
            </p>
</div>
<!-- Form Area -->
<form class="w-full space-y-6" onsubmit="event.preventDefault()">
<!-- Input Field -->
<!-- Requirement: 40dp below description -->
<div class="space-y-1.5 relative group">
<label class="block text-xs font-semibold text-gray-700 ml-1" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-icons-round text-gray-400 text-xl group-focus-within:text-primary transition-colors">email</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all sm:text-sm shadow-sm" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
<!-- Success indicator example (hidden by default) -->
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none opacity-0 group-focus-within:opacity-100 transition-opacity">
<!-- Valid state placeholder if needed -->
</div>
</div>
</div>
<!-- Primary Action Button -->
<!-- Requirement: 24dp below input -->
<button class="w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-lg shadow-sm text-base font-semibold text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-4 focus:ring-primary/30 transition-all active:scale-[0.98]" type="submit">
                Send Reset Link
            </button>
</form>
<!-- Spacer to push bottom link down if screen is tall -->
<div class="flex-grow"></div>
<!-- Bottom Link -->
<div class="w-full py-8 flex justify-center mt-4">
<a class="inline-flex items-center text-sm font-semibold text-primary hover:text-primary-hover transition-colors p-2 rounded-lg hover:bg-primary/5" href="#">
<span class="material-icons-round text-lg mr-1">arrow_back</span>
                Back to Login
            </a>
</div>
</main>
<!-- Background Decorative Elements (Subtle) -->
<!-- Adding subtle blobs to match the "clean modern" request without cluttering -->
<div class="fixed top-0 left-0 right-0 h-64 bg-gradient-to-b from-primary/5 to-transparent pointer-events-none -z-10"></div>
<div class="fixed bottom-0 right-0 w-64 h-64 bg-gradient-to-tl from-primary/5 to-transparent rounded-full blur-3xl pointer-events-none -z-10 translate-x-1/2 translate-y-1/2"></div>
</body></html>
